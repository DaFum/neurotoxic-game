<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEUROTOXIC — Asset Hub · Redesign</title>
    <style>
      :root {
        --void: #0a0a0a;
        --void2: #0c0e0f;
        --ink: #e2e7e0;
        --muted: #8f978d;
        --danger: #ff4646;
        --warn: #ffcc00;
        --acc: #00ff41;
        --glow: 0.55;
        --atmo: 0.4;
        --font-d: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        --font-m:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          'Liberation Mono', monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background:
          radial-gradient(
            120% 90% at 50% -10%,
            color-mix(in srgb, var(--acc) 7%, transparent),
            transparent 55%
          ),
          #050605;
        font-family: var(--font-m);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      .ntx-title {
        font-family: var(--font-d);
        letter-spacing: 0.01em;
        font-weight: 400;
      }
      .ntx-mono {
        font-family: var(--font-m);
      }

      /* ── Stage / phone shell ── */
      .stage {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .phone {
        position: relative;
        width: 393px;
        height: min(852px, calc(100dvh - 40px));
        background: var(--void);
        border: 1px solid color-mix(in srgb, var(--acc) 22%, #1a1a1a);
        border-radius: 30px;
        overflow: hidden;
        box-shadow:
          0 0 0 2px #000,
          0 28px 80px rgba(0, 0, 0, 0.8),
          0 0 calc(70px * var(--glow))
            color-mix(in srgb, var(--acc) 22%, transparent);
      }

      .screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        background:
          linear-gradient(
            135deg,
            color-mix(in srgb, var(--void) 96%, transparent),
            color-mix(in srgb, var(--void) 82%, transparent)
          ),
          repeating-linear-gradient(
            45deg,
            color-mix(in srgb, var(--acc) 6%, transparent) 0 1px,
            transparent 1px 11px
          );
        z-index: 1;
      }

      /* ── Atmosphere overlays ── */
      .atmo {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 60;
        opacity: var(--atmo);
      }
      .atmo-scan {
        background: repeating-linear-gradient(
          to bottom,
          transparent 0 2px,
          rgba(0, 0, 0, 0.32) 2px 3px
        );
        mix-blend-mode: multiply;
      }
      .atmo-grain {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: calc(var(--atmo) * 0.12);
        animation: grain 1.4s steps(6) infinite;
      }
      @keyframes grain {
        0% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(-3%, 2%);
        }
        100% {
          transform: translate(2%, -2%);
        }
      }

      /* ── Shared brutalist panel ── */
      .ntx-panel {
        border: 2px solid var(--acc);
        background:
          linear-gradient(
            180deg,
            color-mix(in srgb, var(--void) 86%, transparent),
            color-mix(in srgb, var(--void) 96%, transparent)
          ),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.04) 0 1px,
            transparent 1px 16px
          );
        box-shadow:
          4px 4px 0 var(--acc),
          0 0 calc(22px * var(--glow))
            color-mix(in srgb, var(--acc) 38%, transparent);
      }
      .ntx-chip {
        font-family: var(--font-m);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border: 1.5px solid color-mix(in srgb, var(--acc) 70%, transparent);
        color: var(--acc);
        background: color-mix(in srgb, var(--acc) 12%, transparent);
      }

      /* ── Status header ── */
      .status {
        flex: 0 0 auto;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 10px;
        padding: 18px 16px 12px;
        border-bottom: 2px solid color-mix(in srgb, var(--acc) 40%, transparent);
      }
      .status-cap {
        display: block;
        font-size: 10px;
        letter-spacing: 0.24em;
        color: var(--muted);
        margin-bottom: 1px;
      }
      .status-amt .ntx-title {
        font-size: 40px;
        line-height: 0.86;
        text-shadow: 0 0 calc(18px * var(--glow))
          color-mix(in srgb, var(--acc) 60%, transparent);
      }
      .status-chips {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: flex-end;
      }
      .schip {
        display: flex;
        align-items: center;
        gap: 7px;
        border: 1.5px solid;
        padding: 4px 9px;
        min-width: 124px;
        justify-content: flex-end;
      }
      .schip-cap {
        display: block;
        font-size: 9px;
        letter-spacing: 0.16em;
        color: var(--muted);
      }
      .schip strong {
        font-size: 14px;
      }
      .schip--danger {
        border-color: color-mix(in srgb, var(--danger) 60%, transparent);
        color: var(--danger);
      }
      .schip--warn {
        border-color: color-mix(in srgb, var(--warn) 55%, transparent);
        color: var(--warn);
      }
      .schip > div {
        text-align: right;
      }

      /* ── Scroll region ── */
      .scroll {
        flex: 1 1 auto;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 14px 14px 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scrollbar-width: thin;
        scrollbar-color: var(--acc) transparent;
      }
      .scroll::-webkit-scrollbar {
        width: 7px;
      }
      .scroll::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--acc) 60%, transparent);
      }
      .scroll > * {
        flex: 0 0 auto;
      }
      .scroll-pad {
        height: 8px;
        flex: 0 0 auto;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ── Asset card / hero with hotspots ── */
      .asset-card {
        position: relative;
        overflow: hidden;
        padding: 0;
      }
      .asset-cardhead {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px 9px;
        border-bottom: 2px solid color-mix(in srgb, var(--acc) 30%, transparent);
      }
      .asset-cardhead-left {
        min-width: 0;
      }
      .asset-name {
        font-size: 28px;
        line-height: 0.86;
        color: var(--ink);
      }
      .asset-tags {
        display: flex;
        gap: 6px;
        margin-top: 7px;
      }
      .asset-cond {
        flex: 0 0 auto;
        font-size: 14px;
        font-weight: 700;
        color: var(--acc);
        border: 2px solid var(--acc);
        padding: 4px 9px;
      }
      .asset-hero {
        position: relative;
        width: 100%;
        overflow: hidden;
      }
      .asset-art {
        display: block;
        width: 100%;
        height: 100%;
      }
      .asset-hero-vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          120% 90% at 50% 45%,
          transparent 55%,
          color-mix(in srgb, var(--void) 42%, transparent) 100%
        );
      }
      .asset-gauge-wrap {
        padding: 8px 12px 11px;
        border-top: 2px solid color-mix(in srgb, var(--acc) 30%, transparent);
      }

      /* conveyor line for workshop */
      .conveyor {
        position: absolute;
        left: 4%;
        right: 12%;
        top: 56%;
        height: 4px;
        background: var(--acc);
        opacity: 0.45;
        pointer-events: none;
        box-shadow: 0 0 10px var(--acc);
      }

      /* ── Hotspots ── */
      .hot {
        position: absolute;
        padding: 0;
        cursor: pointer;
        background: transparent;
        border: none;
        transition: transform 90ms ease;
      }
      .hot:active {
        transform: scale(0.95);
      }
      .hot-img {
        width: 100%;
        height: 100%;
      }
      .hot-plus {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        background: color-mix(in srgb, var(--void) 55%, transparent);
      }

      /* point (tourbus): circular markers */
      .hot--point {
        width: 46px;
        height: 46px;
        transform: translate(-50%, -50%);
        border: 2px solid var(--acc);
        border-radius: 50%;
        overflow: visible;
        box-shadow:
          0 0 0 3px rgba(0, 0, 0, 0.5),
          0 0 14px color-mix(in srgb, var(--acc) 55%, transparent);
      }
      .hot--point .hot-img,
      .hot--point .hot-plus {
        border-radius: 50%;
        overflow: hidden;
      }
      .hot--point.hot--empty {
        border-style: dashed;
      }
      .hot--point:hover {
        box-shadow:
          0 0 0 3px rgba(0, 0, 0, 0.5),
          0 0 20px var(--acc);
      }
      .hot--point:active {
        transform: translate(-50%, -50%) scale(0.92);
      }

      /* zone (studio/bandhaus/workshop): rectangle markers */
      .hot--zone {
        border: 2px dashed var(--acc);
        overflow: hidden;
        background: color-mix(in srgb, var(--void) 35%, transparent);
        box-shadow:
          inset 0 0 0 1px rgba(0, 0, 0, 0.4),
          0 0 12px color-mix(in srgb, var(--acc) 35%, transparent);
        min-width: 40px;
        min-height: 40px;
      }
      .hot--zone.hot--filled {
        border-style: solid;
      }
      .hot--zone:hover {
        box-shadow:
          inset 0 0 0 1px rgba(0, 0, 0, 0.4),
          0 0 18px var(--acc);
      }
      .hot--zone .hot-plus {
        background: transparent;
      }
      .hot-zonelbl {
        position: absolute;
        left: 0;
        bottom: 0;
        max-width: 100%;
        font-size: 9px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        white-space: nowrap;
        color: var(--void);
        background: var(--acc);
        padding: 1px 5px;
        pointer-events: none;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .hot--zone.hot--empty .hot-zonelbl {
        color: var(--acc);
        background: color-mix(in srgb, var(--void) 80%, transparent);
      }

      /* ── Gauge ── */
      .gauge-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 5px;
      }
      .gauge-cap {
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--muted);
      }
      .gauge-val {
        font-size: 14px;
        font-weight: 700;
      }
      .gauge-track {
        display: flex;
        gap: 3px;
      }
      .gauge-seg {
        flex: 1;
        height: 8px;
      }

      /* ── Action bar ── */
      .actionbar {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .actionbtn {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        min-height: 56px;
        border: 2px solid color-mix(in srgb, var(--acc) 70%, transparent);
        background: color-mix(in srgb, var(--void) 70%, transparent);
        color: var(--ink);
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 12px;
        transition:
          transform 80ms,
          background 120ms;
      }
      .actionbtn span.ntx-mono {
        font-size: 11px;
      }
      .actionbtn:hover {
        background: color-mix(in srgb, var(--acc) 14%, transparent);
      }
      .actionbtn:active {
        transform: translateY(1px);
      }
      .actionbtn--hot {
        border-color: var(--danger);
        color: var(--danger);
        box-shadow: 3px 3px 0 var(--danger);
        animation: hot 1.1s ease-in-out infinite;
      }
      .actionbtn-dot {
        position: absolute;
        top: 5px;
        right: 6px;
        width: 7px;
        height: 7px;
        background: var(--danger);
      }
      @keyframes hot {
        0%,
        100% {
          box-shadow: 3px 3px 0 var(--danger);
        }
        50% {
          box-shadow:
            3px 3px 0 var(--danger),
            0 0 16px var(--danger);
        }
      }

      /* ── Rig / slot rows ── */
      .rig {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .rig-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: 0 1px;
      }
      .rig-title {
        font-size: 24px;
      }
      .rig-count {
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .rig-list {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .slotrow {
        display: grid;
        grid-template-columns: 52px 1fr 22px;
        align-items: center;
        gap: 10px;
        text-align: left;
        cursor: pointer;
        color: var(--ink);
        border: 2px solid color-mix(in srgb, var(--acc) 55%, transparent);
        background: color-mix(in srgb, var(--void) 80%, transparent);
        padding: 8px 9px;
        transition:
          transform 80ms,
          box-shadow 120ms;
      }
      .slotrow:hover {
        box-shadow: 3px 3px 0 var(--acc);
      }
      .slotrow:active {
        transform: translateY(1px);
      }
      .slotrow--empty {
        border-style: dashed;
        background: color-mix(in srgb, var(--void) 62%, transparent);
      }
      .slotrow-thumb {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border: 1.5px solid color-mix(in srgb, var(--acc) 45%, transparent);
        background: color-mix(in srgb, var(--void) 70%, transparent);
        overflow: hidden;
      }
      .slotrow-img {
        width: 100%;
        height: 100%;
      }
      .slotrow-body {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .slotrow-slot {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .slotrow-mod {
        font-size: 15px;
        line-height: 1.05;
        color: var(--ink);
      }
      .slotrow-empty-lbl {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.04em;
      }
      .slotrow-chev {
        display: grid;
        place-items: center;
        opacity: 0.7;
        transform: rotate(-90deg);
      }

      .effect-chip {
        font-family: var(--font-m);
        font-size: 11px;
        line-height: 1.3;
        color: color-mix(in srgb, var(--acc) 85%, white 5%);
        border-left: 3px solid var(--acc);
        background: color-mix(in srgb, var(--acc) 9%, transparent);
        padding: 4px 7px;
        display: block;
      }

      /* ── Finance ── */
      .finance {
        padding: 11px 12px 13px;
      }
      .finance-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 9px;
      }
      .finance-title {
        font-size: 18px;
      }
      .finance-empty {
        font-size: 12px;
        color: var(--muted);
      }
      .liab-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .liab {
        border: 2px solid color-mix(in srgb, var(--acc) 55%, transparent);
        padding: 7px 9px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .liab-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .liab-kind {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
      }
      .liab-daily {
        font-size: 14px;
        color: var(--danger);
      }
      .liab-sub {
        font-size: 11px;
        color: var(--ink);
      }
      .liab-refi {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border: 1.5px solid var(--acc);
        color: var(--acc);
        background: transparent;
        padding: 4px 8px;
        cursor: pointer;
        min-height: 30px;
      }
      .liab-refi:hover {
        background: color-mix(in srgb, var(--acc) 16%, transparent);
      }

      /* ── Empty section ── */
      .empty-sec {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .empty-art-wrap {
        position: relative;
        overflow: hidden;
        padding: 0;
      }
      .empty-art {
        width: 100%;
        aspect-ratio: 16/10;
        display: block;
      }
      .empty-art-grad {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          var(--void) 4%,
          color-mix(in srgb, var(--void) 55%, transparent) 50%,
          color-mix(in srgb, var(--void) 30%, transparent)
        );
      }
      .empty-overlay {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 12px 14px 14px;
      }
      .empty-tag {
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--warn);
      }
      .empty-name {
        font-size: 36px;
        line-height: 0.84;
        margin: 4px 0 2px;
      }
      .empty-desc {
        font-size: 12px;
        color: var(--muted);
      }
      .acquire-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        min-height: 56px;
        border: 2px solid var(--acc);
        background: var(--acc);
        color: var(--void);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        cursor: pointer;
        box-shadow: 4px 4px 0 color-mix(in srgb, var(--acc) 45%, transparent);
      }
      .acquire-cta:active {
        transform: translateY(1px);
      }

      /* ── Tab bar ── */
      .tabbar {
        flex: 0 0 auto;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
        border-top: 2px solid var(--acc);
        background: color-mix(in srgb, var(--void) 96%, transparent);
        z-index: 40;
      }
      .tab {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        min-height: 52px;
        border: 2px solid color-mix(in srgb, var(--acc) 40%, transparent);
        background: color-mix(in srgb, var(--void) 72%, transparent);
        color: var(--muted);
        cursor: pointer;
      }
      .tab-lbl {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .tab--active {
        border-color: var(--acc);
        background: var(--acc);
        color: var(--void);
        box-shadow: 0 0 calc(16px * var(--glow))
          color-mix(in srgb, var(--acc) 60%, transparent);
      }
      .tab--active .tab-lbl {
        color: var(--void);
      }

      /* ── Generated image ── */
      .genimg {
        position: relative;
        overflow: hidden;
        background: #060706;
      }
      .genimg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: opacity 420ms ease;
      }
      .genimg-ph {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          repeating-linear-gradient(
            45deg,
            color-mix(in srgb, var(--acc) 8%, transparent) 0 6px,
            transparent 6px 12px
          ),
          #070807;
      }
      .genimg-ph--off {
        background:
          repeating-linear-gradient(
            45deg,
            rgba(255, 255, 255, 0.04) 0 6px,
            transparent 6px 12px
          ),
          #070807;
      }
      .genimg-scan {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0 3px,
          color-mix(in srgb, var(--acc) 10%, transparent) 3px 4px
        );
        animation: phscan 1.2s linear infinite;
      }
      @keyframes phscan {
        from {
          background-position-y: 0;
        }
        to {
          background-position-y: 24px;
        }
      }
      .genimg-label {
        position: relative;
        font-size: 10px;
        letter-spacing: 0.22em;
        color: color-mix(in srgb, var(--acc) 70%, transparent);
      }

      /* ── Sheets ── */
      .sheet-backdrop {
        position: absolute;
        inset: 0;
        z-index: 80;
        background: color-mix(in srgb, var(--void) 78%, transparent);
        backdrop-filter: blur(2px);
        display: flex;
        align-items: flex-end;
      }
      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .sheet {
        width: 100%;
        max-height: 88%;
        display: flex;
        flex-direction: column;
        border-top: 2px solid var(--acc);
        background:
          linear-gradient(
            180deg,
            color-mix(in srgb, var(--void) 92%, transparent),
            var(--void)
          ),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.04) 0 1px,
            transparent 1px 16px
          );
        box-shadow:
          0 -8px 40px rgba(0, 0, 0, 0.7),
          0 0 calc(40px * var(--glow))
            color-mix(in srgb, var(--acc) 30%, transparent);
      }
      @keyframes slideup {
        from {
          transform: translateY(100%);
        }
        to {
          transform: none;
        }
      }
      .sheet-grip {
        width: 44px;
        height: 4px;
        background: color-mix(in srgb, var(--acc) 55%, transparent);
        margin: 9px auto 0;
      }
      .sheet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 14px 10px;
        border-bottom: 2px solid color-mix(in srgb, var(--acc) 30%, transparent);
      }
      .sheet-title {
        font-size: 24px;
      }
      .sheet-x {
        border: 2px solid color-mix(in srgb, var(--acc) 60%, transparent);
        background: transparent;
        color: var(--acc);
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        cursor: pointer;
      }
      .sheet-x:hover {
        background: color-mix(in srgb, var(--acc) 14%, transparent);
      }
      .sheet-body {
        overflow-y: auto;
        padding: 12px 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        scrollbar-width: thin;
        scrollbar-color: var(--acc) transparent;
      }
      .sheet-slotlabel {
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .sheet-empty {
        font-size: 12px;
        color: var(--muted);
      }

      /* ── Module cards in sheet ── */
      .mod-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .mod-card {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 11px;
        border: 2px solid color-mix(in srgb, var(--acc) 55%, transparent);
        background: color-mix(in srgb, var(--void) 70%, transparent);
        padding: 9px;
      }
      .mod-card--installed {
        border-color: var(--acc);
        box-shadow: 3px 3px 0 var(--acc);
      }
      .mod-card--blocked {
        opacity: 0.62;
      }
      .mod-thumb {
        width: 92px;
        aspect-ratio: 1/1;
        border: 1.5px solid color-mix(in srgb, var(--acc) 40%, transparent);
      }
      .mod-info {
        display: flex;
        flex-direction: column;
        gap: 5px;
        min-width: 0;
      }
      .mod-state {
        font-size: 9px;
        letter-spacing: 0.18em;
      }
      .mod-name {
        font-size: 15px;
        line-height: 1.05;
      }
      .mod-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 2px;
      }
      .mod-cost {
        font-size: 14px;
        color: var(--acc);
      }
      .mod-btn {
        border: 2px solid var(--acc);
        background: var(--acc);
        color: var(--void);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 8px 12px;
        min-height: 38px;
        cursor: pointer;
      }
      .mod-btn:disabled {
        background: transparent;
        color: var(--muted);
        border-color: color-mix(in srgb, var(--muted) 50%, transparent);
        cursor: not-allowed;
      }
      .mod-btn--ghost {
        background: transparent;
        color: var(--acc);
        align-self: flex-start;
        margin-top: 2px;
      }
      .mod-lock {
        font-size: 10px;
        color: var(--danger);
        letter-spacing: 0.04em;
      }

      /* ── Acquire sheet ── */
      .acq-art {
        width: 100%;
        aspect-ratio: 16/9;
        border: 2px solid color-mix(in srgb, var(--acc) 45%, transparent);
      }
      .acq-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .acq-lbl {
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .seg {
        display: flex;
        border: 2px solid color-mix(in srgb, var(--acc) 50%, transparent);
      }
      .seg-btn {
        border: none;
        background: transparent;
        color: var(--ink);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 9px 13px;
        min-height: 40px;
        cursor: pointer;
        border-left: 2px solid color-mix(in srgb, var(--acc) 50%, transparent);
      }
      .seg-btn:first-child {
        border-left: none;
      }
      .seg-btn--on {
        background: var(--acc);
        color: var(--void);
      }
      .seg-btn:disabled {
        color: color-mix(in srgb, var(--muted) 60%, transparent);
        cursor: not-allowed;
      }
      .acq-warn {
        font-size: 11px;
        color: var(--danger);
      }
      .acq-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-top: 2px solid var(--acc);
        padding-top: 11px;
      }
      .acq-price {
        font-size: 30px;
      }
      .acq-buy {
        border: 2px solid var(--acc);
        background: var(--acc);
        color: var(--void);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 11px 22px;
        min-height: 48px;
        cursor: pointer;
        box-shadow: 4px 4px 0 color-mix(in srgb, var(--acc) 45%, transparent);
      }
      .acq-buy:disabled {
        background: transparent;
        color: var(--muted);
        box-shadow: none;
        cursor: not-allowed;
      }

      /* ── Toast ── */
      .toast {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 80px;
        z-index: 90;
        display: flex;
        align-items: center;
        gap: 9px;
        border: 2px solid var(--acc);
        background: color-mix(in srgb, var(--void) 92%, transparent);
        color: var(--ink);
        padding: 11px 13px;
        font-size: 13px;
        box-shadow: 4px 4px 0 var(--acc);
      }
      .toast-dot {
        width: 9px;
        height: 9px;
        background: var(--acc);
        flex: 0 0 auto;
      }
      @keyframes toastin {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ── Density: compact ── */
      .density-kompakt .status {
        padding: 12px 14px 9px;
      }
      .density-kompakt .status-amt .ntx-title {
        font-size: 32px;
      }
      .density-kompakt .scroll {
        gap: 10px;
        padding-top: 11px;
      }
      .density-kompakt .asset-name {
        font-size: 26px;
      }
      .density-kompakt .rig-list {
        gap: 5px;
      }
      .density-kompakt .actionbtn {
        min-height: 48px;
      }

      /* ── reduced motion ── */
      @media (prefers-reduced-motion: reduce) {
        .atmo-grain,
        .genimg-scan,
        .actionbtn--hot,
        .scroll,
        .sheet,
        .sheet-backdrop,
        .toast {
          animation: none !important;
        }
      }

      @media (max-width: 440px) {
        .stage {
          padding: 0;
        }
        .phone {
          width: 100vw;
          height: 100dvh;
          border-radius: 0;
          border: none;
        }
      }
    </style>
  </head>
