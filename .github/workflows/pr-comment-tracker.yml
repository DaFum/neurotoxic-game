name: PR Comment Tracker

on:
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted, edited]

jobs:
  update-summary-and-check:
    name: Aggregate Comments & Enforce Resolution
    runs-on: ubuntu-latest
    concurrency:
      group: pr-comment-tracker-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    # Stellt sicher, dass der Workflow nur in Pull Requests läuft
    if: ${{ github.event.issue.pull_request || github.event.pull_request }}

    # Berechtigungen zum Lesen und Schreiben in PRs
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Track, Summarize and Validate Comments
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            // 1. PR-Nummer aus dem Trigger-Event ermitteln
            const prNumber = context.payload.issue
              ? context.payload.issue.number
              : context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            // Unsichtbarer Marker, um den Kommentar des Bots später wiederzufinden
            const marker = "<!-- PR_COMMENT_TRACKER_MARKER -->";

            // 2. Normale Issue-Kommentare, Review-Kommentare und Review-Zusammenfassungen abrufen (mit Pagination)
            const [issueComments, reviewComments, reviews] = await Promise.all([
              github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: prNumber }),
              github.paginate(github.rest.pulls.listReviewComments, { owner, repo, pull_number: prNumber }),
              github.paginate(github.rest.pulls.listReviews, { owner, repo, pull_number: prNumber })
            ]);

            // Review-Zusammenfassungen in das gleiche Format bringen wie andere Kommentare
            const reviewSummaries = reviews.filter(r => r.body && r.body.trim().length > 0 && r.user).map(r => ({
              ...r,
              created_at: r.submitted_at || r.created_at
            }));

            // 3. Kommentare filtern: Null-User abfangen, BOTS BEHALTEN, nur den Tracker-Bot selbst ignorieren
            const allComments = [...issueComments, ...reviewComments, ...reviewSummaries]
              .filter(comment => comment.user) // Alle existierenden Nutzer und Bots zulassen
              .filter(comment => comment.body && !comment.body.includes(marker)) // Den Tracker-Bot selbst ignorieren
              .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            // 4. Den kopierbaren Block formatieren
            const formattedComments = allComments.map(c => {
              // Verhindere das Ausbrechen aus dem Markdown Code-Block, indem Backticks maskiert werden
              const cleanBody = c.body.replace(/\r?\n|\r/g, ' ').replace(/```/g, '\\`\\`\\`').trim();
              return `- [${c.user.login}]: ${cleanBody}`;
            }).join('\n');

            let copyableBlock = formattedComments.length > 0
              ? formattedComments
              : "Keine Kommentare vorhanden.";

            const header = `\n### 📝 PR Kommentar-Zusammenfassung\n*Wird automatisch aktualisiert, sobald sich Kommentare ändern.*\n\n\`\`\`text\n`;
            const footer = `\n\`\`\`\n`;
            const MAX_COMMENT_SIZE = 65536;
            const extraText = "\n... (truncated)";
            const fixedLength = marker.length + header.length + footer.length;

            if (fixedLength + copyableBlock.length > MAX_COMMENT_SIZE) {
              const allowedLength = MAX_COMMENT_SIZE - fixedLength - extraText.length;
              copyableBlock = copyableBlock.substring(0, allowedLength) + extraText;
            }

            // Das endgültige Markdown für den Bot-Kommentar
            const body = marker + header + copyableBlock + footer;

            // 5. Prüfen, ob der Zusammenfassungs-Kommentar bereits existiert und updaten/erstellen
            const existingBotComment = issueComments.find(
              c => c.body && c.body.startsWith(marker) && c.user && c.user.type === "Bot"
            );

            try {
              if (existingBotComment) {
                console.log(`Aktualisiere bestehenden Kommentar (ID: ${existingBotComment.id})...`);
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingBotComment.id,
                  body: body
                });
              } else {
                console.log("Erstelle neuen Zusammenfassungs-Kommentar...");
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: body
                });
              }
            } catch (err) {
              core.warning(`Fehler beim Erstellen/Aktualisieren des Zusammenfassungs-Kommentars: ${err.message}`);
            }

            // 6. Workflow-Status auswerten

            // 6.a) Ungelöste Code-Review-Threads via GraphQL ermitteln
            let unresolvedCount = 0;
            let hasNextPage = true;
            let cursor = null;

            while (hasNextPage) {
              const query = `
                query($owner: String!, $repo: String!, $prNumber: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $prNumber) {
                      reviewThreads(first: 100, after: $cursor) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          isResolved
                        }
                      }
                    }
                  }
                }
              `;
              const result = await github.graphql(query, { owner, repo, prNumber, cursor });
              const threads = result.repository.pullRequest.reviewThreads;

              // Alle ungelösten Threads zählen (inklusive Threads von Bots)
              unresolvedCount += threads.nodes.filter(t => !t.isResolved).length;

              hasNextPage = threads.pageInfo.hasNextPage;
              cursor = threads.pageInfo.endCursor;
            }

            // 6.b) Allgemeine Issue-Kommentare zählen (die keine Code-Reviews sind)
            // Diese haben keinen "Resolved"-Status und müssen gelöscht werden
            const activeIssueComments = issueComments
              .filter(c => c.user)
              .filter(c => c.body && !c.body.includes(marker));

            const totalBlockers = unresolvedCount + activeIssueComments.length;

            if (totalBlockers > 0) {
              core.setFailed(`Der Workflow blockiert den PR. Es existieren ${unresolvedCount} ungelöste(r) Review-Thread(s) und ${activeIssueComments.length} offene(r) allgemeine(r) Kommentar(e).`);
            } else {
              console.log("Keine blockierenden Kommentare vorhanden. Workflow erfolgreich.");
            }
