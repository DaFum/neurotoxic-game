name: PR Comment Tracker

on:
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted, edited]

jobs:
  update-summary-and-check:
    name: Aggregate Comments & Enforce Resolution
    runs-on: ubuntu-latest
    concurrency:
      group: pr-comment-tracker-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    # Stellt sicher, dass der Workflow nur in Pull Requests läuft
    if: ${{ github.event.issue.pull_request || github.event.pull_request }}

    # Berechtigungen zum Lesen und Schreiben in PRs
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Track, Summarize and Validate Comments
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            // 1. PR-Nummer aus dem Trigger-Event ermitteln
            const prNumber = context.payload.issue
              ? context.payload.issue.number
              : context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            // Unsichtbarer Marker, um den Kommentar des Bots später wiederzufinden
            const marker = "<!-- PR_COMMENT_TRACKER_MARKER -->";

            // 2. Ungelöste Review-Threads via GraphQL ermitteln
            let hasNextPage = true;
            let cursor = null;
            const unresolvedThreads = [];

            while (hasNextPage) {
              const query = `
                query($owner: String!, $repo: String!, $prNumber: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $prNumber) {
                      reviewThreads(first: 100, after: $cursor) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          isResolved
                          comments(first: 1) {
                            nodes {
                              author {
                                login
                                __typename
                              }
                              body
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              const result = await github.graphql(query, { owner, repo, prNumber, cursor });
              const threads = result.repository.pullRequest.reviewThreads;

              // Alle ungelösten Threads sammeln
              const openThreads = threads.nodes.filter(t => !t.isResolved);
              unresolvedThreads.push(...openThreads);

              hasNextPage = threads.pageInfo.hasNextPage;
              cursor = threads.pageInfo.endCursor;
            }

            // 3. Den kopierbaren Block formatieren - NUR offene Review Threads
            const seenSignatures = new Set();
            const validThreads = [];

            const formattedComments = unresolvedThreads.map(t => {
              const firstComment = t.comments.nodes[0];
              if (!firstComment) return null;

              const author = firstComment.author;
              const login = author ? author.login : "unknown";

              // Verhindere das Ausbrechen aus dem Markdown Code-Block, indem Backticks maskiert werden
              const cleanBody = firstComment.body.replace(/\r?\n|\r/g, ' ').replace(/```/g, '\\`\\`\\`').trim();

              // Deduplizierung: Wir prüfen für alle Threads, ob wir exakt diesen Kommentar schon gelistet haben
              // Wir nutzen den Autoren-Namen + die ersten 80 Zeichen als eindeutige Signatur
              const signature = `${login}:${cleanBody.substring(0, 80)}`;
              if (seenSignatures.has(signature)) {
                return null; // Überspringen, Thread (identischer Kommentar) wurde bereits erfasst
              }
              seenSignatures.add(signature);

              validThreads.push(t);
              return `- [${login}]: ${cleanBody}`;
            }).filter(Boolean).join('\n');

            let copyableBlock = formattedComments.length > 0
              ? formattedComments
              : "Keine offenen Review-Threads vorhanden.";

            const header = `\n### 📝 PR Kommentar-Zusammenfassung\n*Wird automatisch aktualisiert, sobald sich Kommentare ändern.*\n\n\`\`\`text\n`;
            const footer = `\n\`\`\`\n`;
            const MAX_COMMENT_SIZE = 65536;
            const extraText = "\n... (truncated)";
            const fixedLength = marker.length + header.length + footer.length;

            if (fixedLength + copyableBlock.length > MAX_COMMENT_SIZE) {
              const allowedLength = MAX_COMMENT_SIZE - fixedLength - extraText.length;
              copyableBlock = copyableBlock.substring(0, allowedLength) + extraText;
            }

            // Das endgültige Markdown für den Bot-Kommentar
            const body = marker + header + copyableBlock + footer;

            // 4. Prüfen, ob der Zusammenfassungs-Kommentar bereits existiert und updaten/erstellen
            const issueComments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: prNumber });
            const existingBotComment = issueComments.find(
              c => c.body && c.body.startsWith(marker) && c.user && c.user.type === "Bot"
            );

            try {
              if (existingBotComment) {
                console.log(`Aktualisiere bestehenden Kommentar (ID: ${existingBotComment.id})...`);
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingBotComment.id,
                  body: body
                });
              } else {
                console.log("Erstelle neuen Zusammenfassungs-Kommentar...");
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: body
                });
              }
            } catch (err) {
              core.warning(`Fehler beim Erstellen/Aktualisieren des Zusammenfassungs-Kommentars: ${err.message}`);
            }

            // 5. Workflow-Status auswerten - Bot blockiert nur anhand der deduplizierten offenen Review Threads
            if (validThreads.length > 0) {
              // Schreibe den formatierten Text der blockierenden Review-Threads in core.setFailed (wie im Kommentar)
              core.setFailed(`Der Workflow blockiert den PR. Es existieren ${validThreads.length} ungelöste(r) Review-Thread(s):\n\n${formattedComments}`);
            } else {
              console.log("Keine blockierenden Review-Threads vorhanden. Workflow erfolgreich.");
            }
