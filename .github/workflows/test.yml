name: Tests
run-name: Tests - PR #${{ github.event.pull_request.number || github.run_id }}

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

env:
  MAX_FAILURE_LINES: '500'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NEUROTOXIC_LOG_LEVEL: '3'
  PNPM_VERSION: '10.30.3'

jobs:
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository (merge ref)
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run fast node:test suite
        id: run-tests
        shell: bash
        run: |
          rc=0
          pnpm test 2>&1 | tee test-output-node.txt || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Upload test log artifact (node)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-node
          path: test-output-node.txt

      - name: Comment failed tests on PR (node) — update existing sticky comment
        if: ${{ always() && steps.run-tests.outputs.exit_code != '0' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: ./.github/actions/post-test-failure-comment
        with:
          marker: '<!-- test-results-node: do-not-edit -->'
          file: 'test-output-node.txt'
          regex: '^not ok\b|^\s+✖|FAIL\b|AssertionError|Error:'
          max: ${{ env.MAX_FAILURE_LINES }}
          header: '## ❌ Node.js tests failed'

      - name: Fail if tests failed
        if: ${{ always() && steps.run-tests.outputs.exit_code != '0' }}
        run: exit 1

  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository (merge ref)
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Vitest suite
        id: run-vitest
        shell: bash
        run: |
          rc=0
          pnpm test:ui 2>&1 | tee test-output-vitest.txt || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Upload test log artifact (vitest)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-vitest
          path: test-output-vitest.txt

      - name: Comment failed tests on PR (vitest) — update existing sticky comment
        if: ${{ always() && steps.run-vitest.outputs.exit_code != '0' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: ./.github/actions/post-test-failure-comment
        with:
          marker: '<!-- test-results-vitest: do-not-edit -->'
          file: 'test-output-vitest.txt'
          regex: 'FAIL\b|^\s+[✕×✗]|AssertionError|Error:'
          max: ${{ env.MAX_FAILURE_LINES }}
          header: '## ❌ Vitest tests failed'

      - name: Fail if tests failed
        if: ${{ always() && steps.run-vitest.outputs.exit_code != '0' }}
        run: exit 1

  ts-nocheck-guard:
    name: TS Nocheck Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure no new @ts-nocheck debt in src
        run: pnpm run guard:nocheck

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run TypeScript checks
        run: pnpm run typecheck

  locale-smoke-tests:
    name: Locale Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run locale smoke tests
        id: run-locale
        shell: bash
        run: |
          rc=0
          pnpm test:locale:smoke || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: ${{ always() && steps.run-locale.outputs.exit_code != '0' }}
        run: exit 1

  locale-full-tests:
    name: Locale Full Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run locale full tests
        id: run-locale-full
        shell: bash
        run: |
          rc=0
          pnpm test:locale:full || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: ${{ always() && steps.run-locale-full.outputs.exit_code != '0' }}
        run: exit 1

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run performance tests
        id: run-perf
        shell: bash
        run: |
          rc=0
          pnpm run test:perf || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: ${{ always() && steps.run-perf.outputs.exit_code != '0' }}
        run: exit 1
