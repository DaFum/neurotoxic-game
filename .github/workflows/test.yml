name: Tests
run-name: "Tests - ${{ github.event_name }}"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  tests:
    name: "Run tests: ${{ matrix.target }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [node, vitest]

    env:
      MAX_FAILURE_LINES: '500'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.cache/pnpm
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        id: run-tests
        shell: bash
        run: |
          set -o pipefail
          if [ "${{ matrix.target }}" = "node" ]; then
            cmd="pnpm test"
            out="test-output-node.txt"
          else
            cmd="pnpm test:ui"
            out="test-output-vitest.txt"
          fi

          echo "Running: $cmd"
          # tee so we have a file and still see logs; allow the command to exit non-zero
          $cmd 2>&1 | tee "$out" || true
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload test log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.target }}
          path: ${{ matrix.target == 'node' && 'test-output-node.txt' || 'test-output-vitest.txt' }}

      - name: Comment failed tests on PR (sticky)
        if: ${{ always() && steps.run-tests.outputs.exit_code != '0' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const target = '${{ matrix.target }}';
            const file = target === 'node' ? 'test-output-node.txt' : 'test-output-vitest.txt';
            const marker = `<!-- test-results-${{ matrix.target }}: do-not-edit -->`;
            const raw = fs.existsSync(file) ? fs.readFileSync(file, 'utf8') : '';
            const max = parseInt(process.env.MAX_FAILURE_LINES || '500', 10);
            const tailLines = raw.split('\n').slice(-max);

            const body = [
              marker,
              `## ❌ ${target} tests failed`,
              '',
              'Showing last output lines (full log is attached to the run):',
              '```',
              tailLines.join('\n'),
              '```',
              '',
              `See the [CI logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full details.`
            ].join('\n\n');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail job if tests failed
        if: ${{ steps.run-tests.outputs.exit_code != '0' }}
        run: exit 1
        
