name: Tests
run-name: Tests - PR #${{ github.event.pull_request.number || github.run_id }}

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

env:
  MAX_FAILURE_LINES: '500'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NEUROTOXIC_LOG_LEVEL: '3'
  PNPM_VERSION: '11.2.2'

jobs:
  node-tests:
    name: Node.js Tests (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout repository (merge ref)
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run node:test suite (shard ${{ matrix.shard }}/2)
        id: run-tests
        shell: bash
        run: |
          rc=0
          pnpm run test:node -- --shard=${{ matrix.shard }}/2 2>&1 | tee "test-output-node-${{ matrix.shard }}.txt" || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Upload test log artifact (node)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-node-shard-${{ matrix.shard }}
          path: test-output-node-${{ matrix.shard }}.txt

      - name: Comment failed tests on PR (node) — update existing sticky comment
        if: ${{ always() && steps.run-tests.outputs.exit_code != '0' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: ./.github/actions/post-test-failure-comment
        with:
          marker: '<!-- test-results-node-shard-${{ matrix.shard }}: do-not-edit -->'
          file: 'test-output-node-${{ matrix.shard }}.txt'
          regex: '^not ok\b|^\s+✖|FAIL\b|AssertionError|Error:'
          max: ${{ env.MAX_FAILURE_LINES }}
          header: '## ❌ Node.js tests failed (shard ${{ matrix.shard }}/2)'

      - name: Fail if tests failed
        if: ${{ always() && steps.run-tests.outputs.exit_code != '0' }}
        run: exit 1

  vitest-logic:
    name: Vitest Logic
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository (merge ref)
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Vitest Logic suite
        id: run-vitest-logic
        shell: bash
        run: |
          rc=0
          pnpm run test:vitest:logic 2>&1 | tee test-output-vitest-logic.txt || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Upload test log artifact (vitest-logic)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-vitest-logic
          path: test-output-vitest-logic.txt

      - name: Comment failed tests on PR (vitest-logic) — update existing sticky comment
        if: ${{ always() && steps.run-vitest-logic.outputs.exit_code != '0' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: ./.github/actions/post-test-failure-comment
        with:
          marker: '<!-- test-results-vitest-logic: do-not-edit -->'
          file: 'test-output-vitest-logic.txt'
          regex: 'FAIL\\b|^\\s+[✕×✗]|AssertionError|Error:'
          max: ${{ env.MAX_FAILURE_LINES }}
          header: '## ❌ Vitest Logic tests failed'

      - name: Fail if tests failed
        if: ${{ always() && steps.run-vitest-logic.outputs.exit_code != '0' }}
        run: exit 1

  vitest-ui:
    name: Vitest UI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository (merge ref)
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Vitest UI suite
        id: run-vitest-ui
        shell: bash
        run: |
          rc=0
          pnpm run test:vitest:ui 2>&1 | tee test-output-vitest-ui.txt || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Upload test log artifact (vitest-ui)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-vitest-ui
          path: test-output-vitest-ui.txt

      - name: Comment failed tests on PR (vitest-ui) — update existing sticky comment
        if: ${{ always() && steps.run-vitest-ui.outputs.exit_code != '0' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: ./.github/actions/post-test-failure-comment
        with:
          marker: '<!-- test-results-vitest-ui: do-not-edit -->'
          file: 'test-output-vitest-ui.txt'
          regex: 'FAIL\\b|^\\s+[✕×✗]|AssertionError|Error:'
          max: ${{ env.MAX_FAILURE_LINES }}
          header: '## ❌ Vitest UI tests failed'

      - name: Fail if tests failed
        if: ${{ always() && steps.run-vitest-ui.outputs.exit_code != '0' }}
        run: exit 1

  ts-nocheck-guard:
    name: TS Nocheck Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure no new @ts-nocheck debt in src
        run: pnpm run guard:nocheck

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run core TypeScript checks
        run: pnpm run typecheck:core

      - name: Run reducer TypeScript checks
        run: pnpm run typecheck

  locale-smoke-tests:
    name: Locale Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run locale smoke tests
        id: run-locale
        shell: bash
        run: |
          rc=0
          pnpm test:locale:smoke || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: ${{ always() && steps.run-locale.outputs.exit_code != '0' }}
        run: exit 1

  locale-full-tests:
    name: Locale Full Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run locale full tests
        id: run-locale-full
        shell: bash
        run: |
          rc=0
          pnpm test:locale:full || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: ${{ always() && steps.run-locale-full.outputs.exit_code != '0' }}
        run: exit 1

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run performance tests
        id: run-perf
        shell: bash
        run: |
          rc=0
          pnpm run test:perf || rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Fail if tests failed
        if: ${{ always() && steps.run-perf.outputs.exit_code != '0' }}
        run: exit 1

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build production bundle
        run: pnpm run build

  e2e:
    name: E2E (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright e2e (shard ${{ matrix.shard }}/2)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            blob-report/
          if-no-files-found: ignore
          retention-days: 7
