interface:
  display_name: 'Skill Creator'
  short_description: 'create new skills, improve existing skills, and measure skill performance. Use when users want to create a skill from scratch, update or optimize an existing skill, run evals to test a skill, or benchmark skill performance with variance analysis. Also trigger when users say things like "turn this into a skill", "make a skill for X", "help me improve my skill", "test my skill", "evaluate skill performance", or reference any .skill file or SKILL.md. Even if the user just describes a repeatable workflow they want to capture, consider suggesting a skill.'
  default_prompt: 'Design or refine a reusable skill, then define practical evaluation prompts to validate quality. Return: concise diagnosis, concrete implementation steps, and verification commands.'
