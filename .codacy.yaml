---
# Verzeichnis-Ausschlüsse für dein React-Vite-TS Setup
exclude_paths:
  - "dist/**"          # Vite Production Build
  - "node_modules/**"  # Abhängigkeiten
  - "coverage/**"      # Falls du Vitest nutzt
  - ".claude/**"       # KI-Konfigurationen
  - ".agents/**"       # Agenten-Workflows
  - 'public/locales/**'
  - 'src/assets/**'
  - '**/*.mid'
  - '**/*.ogg'
  

# Explizite Aktivierung der korrekten ESLint-Engine
engines:
  eslint-9:
    enabled: true
  pmd-legacy:
    enabled: false
  eslint:
    enabled: true
    
